server {
    listen 80;
    server_name pr.dhruvrajsolanki.in;

    # ── Certbot challenge handler ───────────────────────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Redirect all HTTP traffic to HTTPS ──────────────────────────────────
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name pr.dhruvrajsolanki.in;

    # ── SSL Configuration ─────────────────────────────────────────────────────
    ssl_certificate /etc/letsencrypt/live/pr.dhruvrajsolanki.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pr.dhruvrajsolanki.in/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    # ── Frontend static assets ───────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy API calls to the backend container ─────────────────────────────
    location /graphql {
        proxy_pass         http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_read_timeout 120s;
    }

    location /github {
        proxy_pass         http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass http://backend:4000;
    }

    # ── Cache static assets aggressively ─────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
