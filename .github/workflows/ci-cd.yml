name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─── Lint & Build ────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend deps
        run: npm ci
        working-directory: ./backend

      - name: Install frontend deps
        run: npm ci
        working-directory: ./frontend

      - name: Build frontend
        run: npm run build
        working-directory: ./frontend
        env:
          VITE_API_URL: '' 

  # ─── Docker Build & Push (only on push to main) ──────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/pr-analysis-backend:latest

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/pr-analysis-frontend:latest

  # ─── Deploy to VPS via SSH (only on push to main) ────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            PROJECT_DIR="ai-github-pr-analysis"

            # ── Clone on first deploy ─────────────────────────────────────
            if [ ! -d "$PROJECT_DIR" ]; then
              git clone https://github.com/SolankiDhruvraj/ai-github-pr-analysis.git
            fi
            cd "$PROJECT_DIR"
            git pull origin main

            # ── Create root .env (n8n config) if missing ──────────────────
            if [ ! -f .env ]; then
              echo "Creating root .env from secrets..."
              cat > .env << 'ROOTENV'
            N8N_HOST=${{ secrets.N8N_HOST }}
            N8N_PROTOCOL=https
            N8N_WEBHOOK_URL=${{ secrets.N8N_WEBHOOK_URL }}
            N8N_TIMEZONE=Asia/Kolkata
            N8N_BASE_URL=http://n8n:5678
            N8N_BASIC_AUTH_USER=${{ secrets.N8N_BASIC_AUTH_USER }}
            N8N_BASIC_AUTH_PASSWORD=${{ secrets.N8N_BASIC_AUTH_PASSWORD }}
            N8N_WEBHOOK_SECRET=${{ secrets.N8N_WEBHOOK_SECRET }}
            BACKEND_BASE_URL=http://backend:4000
            SLACK_RELEASE_CHANNEL_ID=${{ secrets.SLACK_RELEASE_CHANNEL_ID }}
            SLACK_APPROVAL_CHANNEL_ID=${{ secrets.SLACK_APPROVAL_CHANNEL_ID }}
            ROOTENV
            fi

            # ── Create backend .env if missing ────────────────────────────
            if [ ! -f backend/.env ]; then
              echo "Creating backend/.env from secrets..."
              cat > backend/.env << 'BACKENDENV'
            GITHUB_TOKEN=${{ secrets.GH_TOKEN }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            CHAT_AI_API_KEY=${{ secrets.CHAT_AI_API_KEY }}
            OPENAI_MODEL=gpt-4.1-mini
            GEMINI_MODEL=gemini-2.0-flash-lite
            N8N_WEBHOOK_SECRET=${{ secrets.N8N_WEBHOOK_SECRET }}
            N8N_AGENT_WEBHOOK_URL=http://n8n:5678/webhook/pr-agent-router
            AUTO_REJECT_RISK_SCORE=15
            AUTO_REJECT_HIGH_ISSUES=3
            PORT=4000
            BACKENDENV
            fi

            # ── Pull images & deploy ──────────────────────────────────────
            docker compose pull
            docker compose up -d --build

            # ── Wait for services to be healthy ───────────────────────────
            echo "Waiting for services to become healthy..."
            sleep 15

            # ── Health check ──────────────────────────────────────────────
            if curl -sf --max-time 5 http://localhost:4000/health > /dev/null; then
              echo "✅ Backend is healthy"
            else
              echo "⚠️  Backend health check failed"
            fi

            if curl -sf --max-time 5 http://localhost:5678/ > /dev/null 2>&1; then
              echo "✅ n8n is healthy"
            else
              echo "⚠️  n8n health check pending (may still be starting)"
            fi

            # ── Clean up old images ───────────────────────────────────────
            docker image prune -f
